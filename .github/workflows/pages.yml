name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate index.html
        run: |
          cat > index.html << 'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Test Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
              h1 { border-bottom: 1px solid #eee; padding-bottom: 10px; }
              ul { list-style: none; padding: 0; }
              li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .time { color: #666; font-size: 0.85em; margin-left: 8px; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <ul>
          HEADER

          find . -name '*.html' ! -name 'index.html' ! -path './.github/*' -type f | sort | while read f; do
            f="${f#./}"
            echo "      <li><a href=\"$f\">$f</a></li>" >> index.html
          done

          cat >> index.html << 'FOOTER'
            </ul>
            <p class="time">Last updated: TIMESTAMP</p>
          </body>
          </html>
          FOOTER

          sed -i "s/TIMESTAMP/$(date -u '+%Y-%m-%d %H:%M:%S UTC')/" index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
